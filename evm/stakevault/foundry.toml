[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 64
fail_on_revert = false

# Named RPC endpoints for fork tests (see Chapter 14). Set MAINNET_RPC_URL in
# your environment; never hardcode keys.
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
